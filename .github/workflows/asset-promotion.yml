name: Itential Asset Promotion Pipeline

on:
  workflow_run:
    workflows: ["Integration Promotion Pipeline"]
    types: [completed]

jobs:
  deploy-staging:
    if: github.event.workflow_run.conclusion == 'success' && contains(github.event.workflow_run.head_branch, '-rc')
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install git+https://github.com/Itential/asyncplatform.git

      - name: Deploy assets to Staging
        env:
          HOST: ${{ secrets.PLATFORM_HOST }}
          CLIENT_ID: ${{ secrets.PLATFORM_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.PLATFORM_CLIENT_SECRET }}
          PROJECT_MEMBERS: ${{ vars.PROJECT_MEMBERS }}
        run: |
          CURRENT_TAG=$(git tag --points-at HEAD | head -1 || true)
          PREV_TAG=$(git tag --sort=-creatordate \
            | grep -v "^${CURRENT_TAG}$" | head -1 || true)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag — processing all assets"
            export CHANGED_FILES=""
          else
            echo "Diffing against $PREV_TAG"
            export CHANGED_FILES=$(git diff --name-only --diff-filter=AM "$PREV_TAG" HEAD \
              | jq -R . | jq -sc .)
          fi

          python .github/scripts/deploy.py Staging


  deploy-production:
    if: github.event.workflow_run.conclusion == 'success' && !contains(github.event.workflow_run.head_branch, '-rc')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install git+https://github.com/Itential/asyncplatform.git

      - name: Deploy assets to Production
        env:
          HOST: ${{ secrets.PLATFORM_HOST }}
          CLIENT_ID: ${{ secrets.PLATFORM_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.PLATFORM_CLIENT_SECRET }}
          PROJECT_MEMBERS: ${{ vars.PROJECT_MEMBERS }}
        run: |
          CURRENT_TAG=$(git tag --points-at HEAD | head -1 || true)
          PREV_TAG=$(git tag --sort=-creatordate \
            | grep -v "^${CURRENT_TAG}$" | head -1 || true)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag — processing all assets"
            export CHANGED_FILES=""
          else
            echo "Diffing against $PREV_TAG"
            export CHANGED_FILES=$(git diff --name-only --diff-filter=AM "$PREV_TAG" HEAD \
              | jq -R . | jq -sc .)
          fi

          python .github/scripts/deploy.py Production
